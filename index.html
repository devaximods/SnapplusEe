<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<HTML>

<HEAD>
    <TITLE> Heart </TITLE>

    <style>
        html, body {
            height: 100%;
            padding: 0;
            margin: 0;
            background: #000;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* 💖 TEXTE EN BAS */
        .bottom-text {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: #ea80b0;
            font-size: 32px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 15px #ff4da6, 0 0 30px #ff1a75;
        }
    </style>
</HEAD>

<BODY>

    <!-- 💖 TEXTE -->
    <div class="bottom-text">Je t’aime Hind ❤️</div>

    <!-- 💖 CŒUR ANIMÉ -->
    <canvas id="pinkboard"></canvas>

    <script>
        var settings = {
            particles: {
                length: 500,
                duration: 2,
                velocity: 100,
                effect: -0.75,
                size: 30,
            },
        };

        (function () {
            var b = 0;
            var c = ["ms", "moz", "webkit", "o"];
            for (var a = 0; a < c.length && !window.requestAnimationFrame; ++a) {
                window.requestAnimationFrame = window[c[a] + "RequestAnimationFrame"];
            }
            if (!window.requestAnimationFrame) {
                window.requestAnimationFrame = function (h) {
                    setTimeout(h, 16);
                };
            }
        })();

        var Point = function (x, y) {
            this.x = x || 0;
            this.y = y || 0;
        };

        Point.prototype.clone = function () {
            return new Point(this.x, this.y);
        };

        Point.prototype.length = function (l) {
            if (l === undefined) return Math.sqrt(this.x * this.x + this.y * this.y);
            this.normalize();
            this.x *= l;
            this.y *= l;
            return this;
        };

        Point.prototype.normalize = function () {
            var l = this.length();
            this.x /= l;
            this.y /= l;
            return this;
        };

        var Particle = function () {
            this.position = new Point();
            this.velocity = new Point();
            this.acceleration = new Point();
            this.age = 0;
        };

        Particle.prototype.initialize = function (x, y, dx, dy) {
            this.position.x = x;
            this.position.y = y;
            this.velocity.x = dx;
            this.velocity.y = dy;
            this.acceleration.x = dx * settings.particles.effect;
            this.acceleration.y = dy * settings.particles.effect;
            this.age = 0;
        };

        Particle.prototype.update = function (dt) {
            this.position.x += this.velocity.x * dt;
            this.position.y += this.velocity.y * dt;
            this.velocity.x += this.acceleration.x * dt;
            this.velocity.y += this.acceleration.y * dt;
            this.age += dt;
        };

        Particle.prototype.draw = function (ctx, img) {
            var size = img.width * (1 - this.age / settings.particles.duration);
            ctx.globalAlpha = 1 - this.age / settings.particles.duration;
            ctx.drawImage(img, this.position.x, this.position.y, size, size);
        };

        var ParticlePool = function (len) {
            var particles = [];
            for (var i = 0; i < len; i++) particles[i] = new Particle();

            var firstActive = 0;
            var firstFree = 0;

            this.add = function (x, y, dx, dy) {
                particles[firstFree].initialize(x, y, dx, dy);
                firstFree = (firstFree + 1) % len;
                if (firstFree === firstActive) firstActive = (firstActive + 1) % len;
            };

            this.update = function (dt) {
                for (var i = firstActive; i !== firstFree; i = (i + 1) % len) {
                    particles[i].update(dt);
                }
            };

            this.draw = function (ctx, img) {
                for (var i = firstActive; i !== firstFree; i = (i + 1) % len) {
                    particles[i].draw(ctx, img);
                }
            };
        };

        (function (canvas) {
            var ctx = canvas.getContext("2d");
            var particles = new ParticlePool(settings.particles.length);
            var time;

            function heart(t) {
                return new Point(
                    160 * Math.pow(Math.sin(t), 3),
                    130 * Math.cos(t) - 50 * Math.cos(2 * t) - 20 * Math.cos(3 * t)
                );
            }

            var img = (function () {
                var c = document.createElement("canvas");
                var ctx = c.getContext("2d");
                c.width = c.height = settings.particles.size;

                ctx.fillStyle = "#ea80b0";
                ctx.beginPath();
                ctx.arc(c.width / 2, c.height / 2, 5, 0, Math.PI * 2);
                ctx.fill();

                var i = new Image();
                i.src = c.toDataURL();
                return i;
            })();

            function render() {
                requestAnimationFrame(render);

                var newTime = Date.now() / 1000;
                var dt = newTime - (time || newTime);
                time = newTime;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                for (var i = 0; i < 10; i++) {
                    var p = heart(Math.PI - Math.PI * 2 * Math.random());
                    particles.add(canvas.width / 2 + p.x, canvas.height / 2 - p.y, p.x * 0.01, -p.y * 0.01);
                }

                particles.update(dt);
                particles.draw(ctx, img);
            }

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            window.onresize = resize;
            resize();
            render();

        })(document.getElementById("pinkboard"));
    </script>

</BODY>
</HTML>

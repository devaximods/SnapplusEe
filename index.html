<!-- index.html – intact comme la dernière version que tu as validée, logo discret en haut fixe, texte qui descend naturellement, bouton qui claque, zéro changement de texte ou structure -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NOOR & BH • Beauté Personnalisée</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f9f7f3;
      --gold-light: #d8c0a0;
      --gold-main: #c19a6e;
      --gold-dark: #a67c52;
      --text: #1c1814;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    header {
      position: fixed;
      top: 25px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
    }

    .logo-block {
      display: inline-flex;
      align-items: baseline;
      gap: 0.25em;
    }

    .noor {
      font-size: clamp(1.9rem, 5.5vw, 3rem);
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--gold-main);
    }

    .amp {
      font-size: clamp(1.1rem, 3.5vw, 1.8rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--gold-dark);
    }

    main {
      text-align: center;
      max-width: 680px;
      margin-top: 130px;
    }

    h1 {
      font-size: clamp(2.4rem, 7.5vw, 4.2rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--gold-dark);
      margin-bottom: 1.5rem;
    }

    p.tagline {
      font-size: clamp(1.25rem, 3.8vw, 1.7rem);
      font-weight: 300;
      line-height: 1.65;
      margin-bottom: 3rem;
      max-width: 620px;
      margin-left: auto;
      margin-right: auto;
    }

    .cta {
      padding: 15px 55px;
      font-size: 1.32rem;
      letter-spacing: 0.35em;
      color: white;
      background: var(--gold-dark);
      border: none;
      cursor: pointer;
      transition: all 0.4s ease;
      text-transform: uppercase;
    }

    .cta:hover {
      background: var(--gold-main);
      transform: translateY(-3px);
      box-shadow: 0 15px 45px rgba(166,124,82,0.22);
    }

    @media (max-width: 768px) {
      main { margin-top: 110px; padding: 0 15px; }
      .cta { padding: 13px 45px; font-size: 1.22rem; }
    }

    @media (max-width: 480px) {
      .noor { font-size: clamp(1.7rem, 6vw, 2.6rem); }
      .amp { font-size: clamp(1rem, 4vw, 1.6rem); }
      h1 { font-size: clamp(2rem, 7.5vw, 3.4rem); }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-block">
      <div class="noor">NOOR</div>
      <div class="amp">& BH</div>
    </div>
  </header>

  <main>
    <h1>Diagnostic Beauté Scientifique</h1>
    <p class="tagline">
      Analyse précise de votre carnation, texture et besoins réels.<br>
      Recommandations produits sur mesure – sans erreur de teinte, sans gaspillage.
    </p>

    <button class="cta" onclick="window.location.href='diagnostic.html'">Démarrer le diagnostic</button>
  </main>

</body>
</html>

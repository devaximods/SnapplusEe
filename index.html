<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<HTML>

<HEAD>
    <TITLE> Heart </TITLE>

    <style>
        html, body {
            height: 100%;
            padding: 0;
            margin: 0;
            background: #000;
            overflow: hidden;
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* 💖 TEXTE EN BAS SANS TOUCHER AU CŒUR */
        .bottom-text {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #ea80b0;
            font-size: 28px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 15px #ff4da6;
        }
    </style>
</HEAD>

<BODY>

    <div class="bottom-text">Je t’aime hindouuu ❤️</div>

    <canvas id="pinkboard"></canvas>

    <script>
        var settings = {
            particles: {
                length: 500,
                duration: 2,
                velocity: 100,
                effect: -0.75,
                size: 30,
            },
        };

        (function () {
            var b = 0;
            var c = ["ms", "moz", "webkit", "o"];
            for (var a = 0; a < c.length && !window.requestAnimationFrame; ++a) {
                window.requestAnimationFrame = window[c[a] + "RequestAnimationFrame"];
                window.cancelAnimationFrame = window[c[a] + "CancelAnimationFrame"];
            }
            if (!window.requestAnimationFrame) {
                window.requestAnimationFrame = function (h) {
                    setTimeout(h, 16);
                };
            }
        })();

        var Point = function (x, y) {
            this.x = x || 0;
            this.y = y || 0;
        };

        Point.prototype.clone = function () {
            return new Point(this.x, this.y);
        };

        Point.prototype.length = function (l) {
            if (l === undefined) return Math.sqrt(this.x * this.x + this.y * this.y);
            this.normalize();
            this.x *= l;
            this.y *= l;
            return this;
        };

        Point.prototype.normalize = function () {
            var l = this.length();
            this.x /= l;
            this.y /= l;
            return this;
        };

        var Particle = function () {
            this.position = new Point();
            this.velocity = new Point();
            this.acceleration = new Point();
            this.age = 0;
        };

        Particle.prototype.initialize = function (x, y, dx, dy) {
            this.position.x = x;
            this.position.y = y;
            this.velocity.x = dx;
            this.velocity.y = dy;
            this.acceleration.x = dx * settings.particles.effect;
            this.acceleration.y = dy * settings.particles.effect;
            this.age = 0;
        };

        Particle.prototype.update = function (dt) {
            this.position.x += this.velocity.x * dt;
            this.position.y += this.velocity.y * dt;
            this.velocity.x += this.acceleration.x * dt;
            this.velocity.y += this.acceleration.y * dt;
            this.age += dt;
        };

        Particle.prototype.draw = function (ctx, image) {
            var size = image.width * (1 - this.age / settings.particles.duration);
            ctx.globalAlpha = 1 - this.age / settings.particles.duration;
            ctx.drawImage(image, this.position.x, this.position.y, size, size);
        };

        var ParticlePool = function (length) {
            var particles = new Array(length);
            for (var i = 0; i < particles.length; i++)
                particles[i] = new Particle();

            var firstActive = 0;
            var firstFree = 0;

            this.add = function (x, y, dx, dy) {
                particles[firstFree].initialize(x, y, dx, dy);
                firstFree = (firstFree + 1) % length;
                if (firstFree === firstActive)
                    firstActive = (firstActive + 1) % length;
            };

            this.update = function (dt) {
                for (var i = firstActive; i !== firstFree; i = (i + 1) % length) {
                    particles[i].update(dt);
                }
            };

            this.draw = function (ctx, image) {
                for (var i = firstActive; i !== firstFree; i = (i + 1) % length) {
                    particles[i].draw(ctx, image);
                }
            };
        };

        (function (canvas) {
            var ctx = canvas.getContext("2d"),
                particles = new ParticlePool(settings.particles.length),
                time;

            function pointOnHeart(t) {
                return new Point(
                    160 * Math.pow(Math.sin(t), 3),
                    130 * Math.cos(t) - 50 * Math.cos(2 * t) - 20 * Math.cos(3 * t) - 10 * Math.cos(4 * t) + 25
                );
            }

            var image = (function () {
                var canvas = document.createElement("canvas"),
                    ctx = canvas.getContext("2d");

                canvas.width = settings.particles.size;
                canvas.height = settings.particles.size;

                ctx.beginPath();
                var t = -Math.PI;
                var p = pointOnHeart(t);
                ctx.moveTo(p.x, p.y);

                while (t < Math.PI) {
                    t += 0.01;
                    p = pointOnHeart(t);
                    ctx.lineTo(p.x, p.y);
                }

                ctx.closePath();
                ctx.fillStyle = "#ea80b0";
                ctx.fill();

                var img = new Image();
                img.src = canvas.toDataURL();
                return img;
            })();

            function render() {
                requestAnimationFrame(render);

                var newTime = Date.now() / 1000,
                    dt = newTime - (time || newTime);
                time = newTime;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                var amount = settings.particles.length * dt;
                for (var i = 0; i < amount; i++) {
                    var p = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
                    var dir = p.clone().length(settings.particles.velocity);
                    particles.add(canvas.width / 2 + p.x, canvas.height / 2 - p.y, dir.x, -dir.y);
                }

                particles.update(dt);
                particles.draw(ctx, image);
            }

            function resize() {
                canvas.width = canvas.clientWidth;
                canvas.height = canvas.clientHeight;
            }

            window.onresize = resize;

            setTimeout(function () {
                resize();
                render();
            }, 10);

        })(document.getElementById("pinkboard"));
    </script>

</BODY>
</HTML>

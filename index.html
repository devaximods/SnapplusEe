<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation CODENGO v1.2.3 - Succès</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        .bite-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .bite-img {
            max-width: 82%;
            max-height: 82vh;
            animation: pulse 0.8s infinite alternate ease-in-out;
            box-shadow: 0 0 140px #ff00ff, 0 0 200px #ff0088;
            border: 12px solid #ff2222;
        }
        @keyframes pulse {
            from { transform: scale(0.85) rotate(-6deg); }
            to { transform: scale(1.15) rotate(6deg); }
        }
        .rain-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .colleague-img {
            position: absolute;
            width: 195px;
            opacity: 0.92;
            animation: fall linear forwards;
            filter: drop-shadow(0 0 30px #ff00aa);
        }
        @keyframes fall {
            to {
                transform: translateY(140vh) rotate(1440deg);
            }
        }
        .text-overlay {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff4444;
            font-size: 38px;
            text-shadow: 0 0 35px #ff0000;
            z-index: 20;
            text-align: center;
        }
        .click-to-unmute {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffff00;
            font-size: 28px;
            text-shadow: 0 0 20px #ffff00;
            z-index: 30;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <!-- GROSSE BITE QUI PULSE AU CENTRE -->
    <div class="bite-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0e/Erect_penis%2C_with_pre-ejaculate.jpg/800px-Erect_penis%2C_with_pre-ejaculate.jpg" 
             alt="Grosse bite validation" 
             class="bite-img">
    </div>

    <!-- PLUIE DE TON COLLÈGUE TOUT NU -->
    <div class="rain-container" id="rain"></div>

    <div class="text-overlay">
        TA GAGNERRR LES FRITES TES LIBRE <br>
        🤣🤣🤣🤣🤣🤣🤣🤣<br>
        <small>TA GAGNER AVEC NOUS ET TU VA MANGER QUE DES FRITES !</small>
    </div>

    <!-- MESSAGE POUR FORCER LE SON SI LE NAVIGATEUR BLOQUE -->
    <div id="unmute" class="click-to-unmute">
        CLIQUE ICI POUR AVOIR TON CODE 
    </div>

    <!-- TON SON .m4a QUI TOURNE EN BOUCLE SANS FIN -->
    <audio id="suckSound" loop>
        <source src="https://files.catbox.moe/avu0v8.m4a" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('suckSound');
        const unmuteBtn = document.getElementById('unmute');

        // Force le son à démarrer (volume max)
        function startSound() {
            audio.volume = 1.0;
            audio.play().catch(() => {
                unmuteBtn.style.display = 'block';
            });
        }

        // Démarre le son dès le chargement
        window.addEventListener('load', () => {
            startSound();
        });

        // Si le navigateur bloque, un clic sur la page ou sur le bouton lance le son
        document.body.addEventListener('click', () => {
            if (audio.paused) {
                startSound();
                unmuteBtn.style.display = 'none';
            }
        });

        unmuteBtn.addEventListener('click', () => {
            startSound();
            unmuteBtn.style.display = 'none';
        });

        // Pluie ultra dense de tes photos de cul et bite
        const rainContainer = document.getElementById('rain');
        const colleagueImages = [
            "https://i.ibb.co/0zFQYs2/2-E50-EACE-C70-F-493-D-AAFD-E30-D0089042-B.jpg",
            "https://i.ibb.co/bjJ2LD7s/165-CC8-EE-C38-C-4-E3-F-B4-B6-4-AF779-B5-ABC0.jpg",
            "https://i.ibb.co/q3Vgzx61/419-E319-F-02-FB-461-B-94-E6-3-A5-EC8-A19423.jpg",
            "https://i.ibb.co/8gCggjj7/IMG-8819.jpg",
            "https://i.ibb.co/TBThYySw/IMG-8818.jpg",
            "https://i.ibb.co/nVMyjBP/IMG-8817.jpg",
            "https://i.ibb.co/Rmdn9Wr/IMG-0253.jpg"
        ];

        function createFallingNakedColleague() {
            const img = document.createElement('img');
            img.src = colleagueImages[Math.floor(Math.random() * colleagueImages.length)];
            img.classList.add('colleague-img');
            img.style.left = `${Math.random() * 100}vw`;
            const duration = Math.random() * 5.5 + 4.5;
            img.style.animationDuration = `${duration}s`;
            const size = Math.random() * 100 + 170;
            img.style.width = `${size}px`;
            rainContainer.appendChild(img);
            setTimeout(() => img.remove(), 14000);
        }

        // Pluie très rapide et dense
        setInterval(createFallingNakedColleague, 110);

        console.log("%cXSNPOWWWWWW 🍆💦🌧️ La grosse bite pulse + pluie de cul + son qui suce à fond !", "color:#ff00ff; font-size:26px; font-weight:bold;");
    </script>

</body>
</html>
